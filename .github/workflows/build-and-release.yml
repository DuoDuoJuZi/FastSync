name: Build and Release FastSync

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Build Release APK
        working-directory: ./mobile-sender
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: mobile-sender/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: FastSync-Android-APK
          path: ${{steps.sign_app.outputs.signedReleaseFile}}

  build-pc:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup update stable

      - name: Install cargo-packager
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-packager

      - name: Build and Package Rust App
        working-directory: ./pc-receiver
        run: |
          cargo build --release
          cargo packager --release

      - name: Build and Package Rust App
        working-directory: ./pc-receiver
        run: cargo packager --release

      - name: Upload PC Executable
        uses: actions/upload-artifact@v4
        with:
          name: FastSync-PC-Windows
          path: |
            pc-receiver/target/release/*setup.exe

  publish-release:
    needs: [build-android, build-pc]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
